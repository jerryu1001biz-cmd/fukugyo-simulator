<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>副業やめたくなる瞬間診断</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0f1e;
      color: #e8eaf6;
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .container { width: 100%; max-width: 480px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #dc2626, #f43f5e);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.4; }
    .header p { color: #8892b0; font-size: 13px; margin-top: 6px; }

    /* プログレス */
    .progress-wrap { margin-bottom: 20px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #8892b0; margin-bottom: 6px; }
    .progress-bar { width: 100%; height: 4px; background: #1e2a45; border-radius: 2px; }
    .progress-fill { height: 4px; background: linear-gradient(90deg, #dc2626, #f43f5e); border-radius: 2px; transition: width 0.4s; }

    /* 質問 */
    .q-card { background: #131929; border: 1px solid #1e2a45; border-radius: 16px; padding: 24px; }
    .q-num { font-size: 11px; color: #f43f5e; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 10px; }
    .q-text { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.5; margin-bottom: 20px; }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: #0d1433;
      border: 1px solid #1e2a45;
      color: #c8cef0;
      font-size: 14px;
      font-weight: 600;
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .choice-btn:hover { border-color: #f43f5e; color: #fff; }
    .choice-btn.selected { border-color: #f43f5e; background: #2a0f1a; color: #fff; }

    /* 結果 */
    .result-card { background: #131929; border: 1px solid #1e2a45; border-radius: 16px; padding: 28px 24px; display: none; }
    .result-emoji { font-size: 52px; text-align: center; margin-bottom: 12px; }
    .result-name { font-size: 22px; font-weight: 900; color: #fff; text-align: center; }
    .result-sub { font-size: 12px; color: #f43f5e; font-weight: 700; text-align: center; margin-top: 4px; margin-bottom: 20px; }
    .result-desc { font-size: 14px; color: #c8cef0; line-height: 1.8; margin-bottom: 20px; }

    .taisaku-box {
      background: linear-gradient(135deg, #0d1433, #1a0d1a);
      border: 1px solid #3a1a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .taisaku-title { font-size: 12px; color: #f43f5e; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 10px; }
    .taisaku-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .taisaku-num {
      background: #f43f5e;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .taisaku-text { font-size: 13px; color: #c8cef0; line-height: 1.6; }

    .share-btn {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e8eaf6;
      font-size: 13px;
      font-weight: 700;
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .share-btn:hover { background: #252540; }
    .retry-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #1e2a45;
      color: #8892b0;
      font-size: 13px;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .retry-btn:hover { border-color: #f43f5e; color: #c8cef0; }

    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #6c63ff; font-size: 13px; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">QUIT CHECK</div>
    <h1>副業やめたくなる<br>瞬間診断</h1>
    <p>あなたが挫折しやすいパターンと対策がわかる</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">1 / 6</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="q-card" id="q-card">
    <div class="q-num" id="q-num">Q1</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-emoji" id="res-emoji"></div>
    <div class="result-name" id="res-name"></div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-desc" id="res-desc"></div>
    <div class="taisaku-box">
      <div class="taisaku-title">💡 あなたへの処方箋</div>
      <div id="res-taisaku"></div>
    </div>
    <button class="share-btn" onclick="shareResult()">X（Twitter）でシェア</button>
    <button class="retry-btn" onclick="restart()">もう一度やる</button>
  </div>

  <div class="back-link"><a href="index.html">← 副業タイプ診断へ</a></div>
</div>

<script>
const questions = [
  {
    text: '副業を「今日はいいや」と思うのはどんな時？',
    choices: [
      { label: '仕事が忙しくて時間がない', types: { jikan: 3 } },
      { label: '頑張ってるのに数字が動かない', types: { kazu: 3 } },
      { label: '本業で疲れ果てている', types: { energy: 3 } },
      { label: '誰にも見てもらえてる気がしない', types: { kodoku: 3 } },
      { label: '何から手をつけるかわからない', types: { mayoi: 3 } },
    ]
  },
  {
    text: '副業の時間を確保できない一番の理由は？',
    choices: [
      { label: '残業・通勤で時間が溶ける', types: { jikan: 3, energy: 1 } },
      { label: 'やる気が出ない・腰が重い', types: { energy: 2, mayoi: 1 } },
      { label: '何をすればいいか迷ってしまう', types: { mayoi: 3 } },
      { label: '孤独で続ける意味を感じにくい', types: { kodoku: 2, mayoi: 1 } },
    ]
  },
  {
    text: '「もうやめようかな」と思った瞬間に一番近いのは？',
    choices: [
      { label: 'フォロワーが増えない・売れない', types: { kazu: 3 } },
      { label: '睡眠削ってまでやる必要ある？', types: { energy: 3, jikan: 1 } },
      { label: '周りで副業してる人がいない', types: { kodoku: 3 } },
      { label: '方向性が合ってるか不安になる', types: { mayoi: 3 } },
      { label: '毎日続けるのがしんどい', types: { jikan: 2, energy: 1 } },
    ]
  },
  {
    text: '副業のモチベーションが下がる時期はいつ？',
    choices: [
      { label: '始めて1ヶ月、結果が出ない頃', types: { kazu: 3 } },
      { label: '繁忙期など本業が忙しい時期', types: { jikan: 2, energy: 2 } },
      { label: '誰かのすごい実績を見た時', types: { kazu: 2, kodoku: 1 } },
      { label: '次に何をすべきか見えなくなった時', types: { mayoi: 3 } },
      { label: '特になく、日々じわじわ減っていく', types: { energy: 2, kodoku: 1 } },
    ]
  },
  {
    text: '副業を続けるために一番欲しいものは？',
    choices: [
      { label: '一緒に頑張れる仲間', types: { kodoku: 3 } },
      { label: '小さくてもいいから結果・数字', types: { kazu: 3 } },
      { label: 'もっと使える時間', types: { jikan: 3 } },
      { label: '明確なロードマップ・次のアクション', types: { mayoi: 3 } },
      { label: '体力・気力の余裕', types: { energy: 3 } },
    ]
  },
  {
    text: '副業を続けている自分を想像すると？',
    choices: [
      { label: 'どこかで諦めてる気がする', types: { energy: 2, kazu: 1 } },
      { label: '時間が足りなくて中途半端になる', types: { jikan: 3 } },
      { label: '孤独にコツコツやってる', types: { kodoku: 2, energy: 1 } },
      { label: '迷走して方向転換を繰り返してる', types: { mayoi: 3 } },
      { label: '続けてる。でも数字が出るか不安', types: { kazu: 2, energy: 1 } },
    ]
  },
];

const types = {
  jikan: {
    emoji: '🕐',
    name: '時間枯渇型',
    sub: '「時間がない」が口癖になってる',
    desc: '仕事・育児・通勤で時間が溶けてしまい、副業に使える時間が確保できない。意志の問題ではなく、構造の問題。時間を「作る」より「奪われない」設計が必要。',
    taisaku: [
      '朝30分だけを副業の聖域にする。夜は疲れてできなくて当然',
      '通勤・昼休みのスキマ時間に「1つだけ」タスクを決めておく',
      '週5日じゃなく「週3日だけ頑張る」と決める。やれた日を積み上げる',
    ]
  },
  kazu: {
    emoji: '📊',
    name: '数字焦り型',
    sub: '結果が出ないと意味を感じられなくなる',
    desc: 'フォロワー数・売上・いいね数など「数字」が動かないとモチベーションが維持できない。成果が出るまでのタイムラグに弱い。数字の定義を変えると続けやすくなる。',
    taisaku: [
      '「投稿した回数」「作ったものの数」を結果と定義し直す',
      '3ヶ月は数字を見ない覚悟をする。種まき期間と割り切る',
      '小さな数字（初めてのいいね、初めてのリプ）を全部祝う',
    ]
  },
  energy: {
    emoji: '🔋',
    name: 'エネルギー切れ型',
    sub: '本業で疲れ果てて気力が残らない',
    desc: '体力・気力が本業で消耗しきっており、帰宅後に副業に向かうエネルギーが残っていない。意志力の問題ではなく、リソース配分の問題。最小単位まで下げることが鍵。',
    taisaku: [
      '「1日1ツイートだけ」など、最小単位まで下げて習慣化する',
      'やる気に頼らない。「この時間はやる」という仕組みを作る',
      '睡眠を削らない。副業のために体を壊すと本末転倒',
    ]
  },
  kodoku: {
    emoji: '😶',
    name: '孤独型',
    sub: '一人で続けることの孤独感が積み重なる',
    desc: '周りに副業仲間がいない・誰にも見てもらえない感覚が続くと、続ける意味を見失いやすい。成果よりも「つながり」が継続の燃料になるタイプ。',
    taisaku: [
      '同じ境遇の人を1人だけ見つけてフォロー・絡む。それだけで変わる',
      '#ブルバ100 など同じ段階の人が集まるタグを活用する',
      '発信を「誰かへの報告」と思うと続けやすくなる',
    ]
  },
  mayoi: {
    emoji: '🌀',
    name: '迷走型',
    sub: '「何をすればいいか」がわからなくなる',
    desc: '情報が多すぎて何から手をつければいいかわからず、行動が止まる。完璧な方向性を探し続けて動けなくなるパターン。「決めること」より「動くこと」が優先。',
    taisaku: [
      '今日やることを「1つだけ」決める。多くない。1つ',
      '情報収集の時間を週1回30分に制限する',
      '方向性は動きながら修正する。止まって考えても答えは出ない',
    ]
  },
};

let current = 0;
let scores = { jikan: 0, kazu: 0, energy: 0, kodoku: 0, mayoi: 0 };

function showQuestion(i) {
  const q = questions[i];
  document.getElementById('q-num').textContent = `Q${i + 1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-text').textContent = `${i + 1} / ${questions.length}`;
  document.getElementById('progress-pct').textContent = Math.round((i / questions.length) * 100) + '%';
  document.getElementById('progress-fill').style.width = Math.round((i / questions.length) * 100) + '%';

  const el = document.getElementById('choices');
  el.innerHTML = '';
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = () => answer(c.types, idx);
    el.appendChild(btn);
  });
}

function answer(typeScores, idx) {
  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
    b.disabled = true;
  });
  Object.entries(typeScores).forEach(([k, v]) => scores[k] += v);
  setTimeout(() => {
    current++;
    if (current < questions.length) showQuestion(current);
    else showResult();
  }, 300);
}

function showResult() {
  document.getElementById('progress-text').textContent = `${questions.length} / ${questions.length}`;
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('progress-fill').style.width = '100%';

  document.getElementById('q-card').style.display = 'none';
  const resCard = document.getElementById('result-card');
  resCard.style.display = 'block';

  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const t = types[top];

  document.getElementById('res-emoji').textContent = t.emoji;
  document.getElementById('res-name').textContent = t.name;
  document.getElementById('res-sub').textContent = t.sub;
  document.getElementById('res-desc').textContent = t.desc;

  const el = document.getElementById('res-taisaku');
  el.innerHTML = '';
  t.taisaku.forEach((s, i) => {
    el.innerHTML += `<div class="taisaku-item"><span class="taisaku-num">${i+1}</span><span class="taisaku-text">${s}</span></div>`;
  });
}

function shareResult() {
  const name = document.getElementById('res-name').textContent;
  const sub = document.getElementById('res-sub').textContent;
  const text = `副業やめたくなる瞬間診断をやってみた。\n\n${document.getElementById('res-emoji').textContent} ${name}\n「${sub}」\n\n自分のパターンを知ると対策できる。\nhttps://fukugyo-simulator.vercel.app/yameru-check.html\n#副業 #AI副業`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

function restart() {
  current = 0;
  scores = { jikan: 0, kazu: 0, energy: 0, kodoku: 0, mayoi: 0 };
  document.getElementById('q-card').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';
  showQuestion(0);
}

showQuestion(0);
</script>
</body>
</html>
